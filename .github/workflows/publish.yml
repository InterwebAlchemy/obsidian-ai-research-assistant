name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Stable Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Bump version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm version $VERSION --no-git-tag-version
          npm_package_version=$VERSION node scripts/version-bump.mjs
          bash scripts/zip-it.sh
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Obsidian's plugin updater fetches assets from releases/download/<manifest.version>/...
          # so the release tag MUST match manifest.json version exactly (no v prefix).
          # The user-pushed v-prefixed tag triggers the workflow; the release is published
          # against a bare-version tag created here at the same SHA.
          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes \
            "release/obsidian-ai-research-assistant.zip#Obsidian AI Research Assistant Plugin" \
            dist/main.js \
            dist/manifest.json \
            dist/versions.json \
            dist/styles.css
      - name: Commit version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): updating to $VERSION [skip ci]"
          # Beta workflow may have pushed manifest-beta.json concurrently; rebase before pushing
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
