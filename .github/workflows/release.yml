name: Beta Release

on:
  push:
    branches:
      - main

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Determine beta version
        run: |
          # Latest beta tag (with or without v prefix); strip v and -beta.N suffix for base
          LAST_BETA=$(git tag | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' | sed 's/^v//' | sort -V | tail -1)
          if [ -n "$LAST_BETA" ]; then
            BASE_VERSION=$(echo "$LAST_BETA" | sed 's/-beta\..*//')
            BETA_COUNT=$(git tag | grep -E "^v?${BASE_VERSION}-beta\." | wc -l | tr -d ' ')
          else
            BASE_VERSION=$(node -p "require('./package.json').version" | sed 's/-.*//')
            BETA_COUNT=0
          fi
          NEXT_BETA=$((BETA_COUNT + 1))
          BETA_VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
          echo "BETA_VERSION=${BETA_VERSION}" >> $GITHUB_ENV
      - name: Update manifest-beta.json
        run: |
          npm_package_version=$BETA_VERSION node scripts/version-bump.mjs
          bash scripts/zip-it.sh
      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest-beta.json
          git commit -m "chore(release): updating to $BETA_VERSION [skip ci]"
          git tag $BETA_VERSION
          git push origin main
          git push origin $BETA_VERSION
      - name: Create GitHub pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $BETA_VERSION \
            --prerelease \
            --title "$BETA_VERSION" \
            --generate-notes \
            "release/obsidian-ai-research-assistant.zip#Obsidian AI Research Assistant Plugin" \
            dist/main.js \
            dist/manifest.json \
            manifest-beta.json \
            dist/styles.css
