name: Beta Release

on:
  push:
    branches:
      - main

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Determine beta version
        run: |
          # Base version from package.json (strip any pre-release suffix)
          BASE_VERSION=$(node -p "require('./package.json').version" | sed 's/-.*//')
          # Count existing beta tags for this base version to get the next number
          # Match both v-prefixed and bare tags to handle mixed tag histories
          BETA_COUNT=$(git tag | grep -E "^v?${BASE_VERSION}-beta\." | wc -l | tr -d ' ')
          NEXT_BETA=$((BETA_COUNT + 1))
          BETA_VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
          echo "BETA_VERSION=${BETA_VERSION}" >> $GITHUB_ENV
      - name: Bump version
        run: npm version $BETA_VERSION --no-git-tag-version
      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest-beta.json package.json package-lock.json
          git commit -m "chore(release): updating to $BETA_VERSION [skip ci]"
          git tag v$BETA_VERSION
          git push origin main
          git push origin v$BETA_VERSION
      - name: Create GitHub pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v$BETA_VERSION \
            --prerelease \
            --title "v$BETA_VERSION" \
            --generate-notes \
            "release/obsidian-ai-research-assistant.zip#Obsidian AI Research Assistant Plugin" \
            dist/main.js \
            dist/manifest.json \
            manifest-beta.json \
            dist/styles.css
